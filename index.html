<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gena — Green Energy Alert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Instrument+Sans:ital,wght@0,400..700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10251A;
  --pine:#1E5E3F;
  --leaf:#3FAE6A;
  --glow:#C9F27E;
  --sun:#F2B33D;
  --wind:#4C9FD8;
  --paper:#F3F8F1;
  --card:#FFFFFF;
  --line:#D8E6D8;
  --bad:#D96A4B;
  --radius:18px;
  font-size:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Instrument Sans',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.55;
}
h1,h2,h3,.display{font-family:'Bricolage Grotesque','Instrument Sans',sans-serif}
a{color:var(--pine)}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:1rem}
:focus-visible{outline:3px solid var(--leaf);outline-offset:2px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(243,248,241,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.header-in{
  max-width:1120px;margin:0 auto;padding:.8rem 1.2rem;
  display:flex;align-items:center;gap:1.5rem;
}
.logo{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
  font-size:1.55rem;letter-spacing:-.03em;color:var(--ink);text-decoration:none;
  display:flex;align-items:baseline;gap:.55rem;
}
.logo .dot{width:.85rem;height:.85rem;border-radius:50%;background:var(--glow);border:2.5px solid var(--pine);display:inline-block;align-self:center}
.logo small{font-family:'Instrument Sans',sans-serif;font-weight:600;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#557060}
@media(max-width:560px){.logo small{display:none}}
nav{display:flex;gap:1.2rem;margin-left:auto}
nav a{text-decoration:none;color:var(--ink);font-weight:500;font-size:.95rem}
nav a:hover{color:var(--pine)}
.langs{display:flex;gap:.3rem;margin-left:1rem}
.langs button{
  border:1.5px solid var(--line);background:var(--card);border-radius:999px;
  padding:.28rem .7rem;font-size:.82rem;font-weight:600;color:var(--ink);
}
.langs button[aria-pressed="true"]{background:var(--ink);color:var(--glow);border-color:var(--ink)}
@media(max-width:760px){nav{display:none}}

/* ---------- hero ---------- */
.hero{max-width:1120px;margin:0 auto;padding:3.2rem 1.2rem 2rem;display:grid;grid-template-columns:1.05fr .95fr;gap:2.5rem;align-items:center}
@media(max-width:900px){.hero{grid-template-columns:1fr}}
.hero h1{font-size:clamp(2.1rem,4.6vw,3.4rem);font-weight:800;letter-spacing:-.035em;line-height:1.06}
.hero h1 em{font-style:normal;color:var(--pine);background:linear-gradient(transparent 62%,var(--glow) 62%)}
.hero p.lede{margin-top:1rem;font-size:1.12rem;max-width:34rem;color:#2c463a}
.search{
  margin-top:1.6rem;display:flex;gap:.5rem;flex-wrap:wrap;
}
.search input{
  flex:1;min-width:220px;padding:.85rem 1.1rem;border:2px solid var(--ink);
  border-radius:var(--radius);background:var(--card);
}
.search button{
  padding:.85rem 1.5rem;border:none;border-radius:var(--radius);
  background:var(--ink);color:var(--glow);font-weight:700;font-size:1rem;
}
.search button:hover{background:var(--pine)}
.search-hint{font-size:.85rem;color:#557060;margin-top:.5rem}
.geo-msg{font-size:.9rem;margin-top:.6rem;font-weight:600}
.geo-msg.err{color:var(--bad)}
.geo-msg.ok{color:var(--pine)}

/* status card */
.status-card{
  background:var(--card);border:1.5px solid var(--line);border-radius:26px;
  padding:1.6rem;box-shadow:0 14px 40px -22px rgba(16,37,26,.35);
}
.status-top{display:flex;align-items:center;gap:1.1rem}
.dial{
  width:96px;height:96px;border-radius:50%;flex:none;
  display:grid;place-items:center;font-size:2.1rem;
  border:6px solid var(--line);transition:border-color .4s,background .4s;
  background:#f2f2ee;
}
.dial.green{border-color:var(--leaf);background:var(--glow)}
.dial.mid{border-color:var(--sun);background:#FBEBC8}
.dial.low{border-color:var(--bad);background:#F6DED5}
.status-label{font-family:'Bricolage Grotesque',sans-serif;font-size:1.35rem;font-weight:700;line-height:1.15}
.status-sub{color:#557060;font-size:.92rem;margin-top:.2rem}
.status-loc{font-size:.85rem;font-weight:600;color:var(--pine);margin-bottom:.7rem;display:flex;align-items:center;gap:.35rem}
.price-line{
  margin-top:1rem;display:flex;align-items:center;gap:.6rem;
  padding:.7rem .9rem;border-radius:12px;background:var(--paper);font-size:.93rem;
}
.price-line .p-val{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.15rem}
.price-tag{padding:.12rem .55rem;border-radius:999px;font-size:.75rem;font-weight:700}
.next-window{
  margin-top:.8rem;padding:.9rem 1rem;border-radius:14px;background:var(--paper);
  border:1px dashed var(--pine);font-size:.95rem;
}
.next-window strong{color:var(--pine)}

/* ---------- timeline ---------- */
.section{max-width:1120px;margin:0 auto;padding:3rem 1.2rem}
.eyebrow{font-size:.8rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pine)}
.section h2{font-size:clamp(1.6rem,3vw,2.3rem);font-weight:800;letter-spacing:-.02em;margin:.3rem 0 .6rem}
.section .sub{color:#2c463a;max-width:44rem}
.tabs{display:flex;gap:.4rem;margin:1.4rem 0 1rem}
.tabs button{
  border:1.5px solid var(--line);background:var(--card);border-radius:999px;
  padding:.45rem 1.1rem;font-weight:600;font-size:.92rem;
}
.tabs button[aria-selected="true"]{background:var(--pine);color:#fff;border-color:var(--pine)}
.strip-wrap{background:var(--card);border:1.5px solid var(--line);border-radius:22px;padding:1.4rem;overflow-x:auto}
.strip{display:flex;gap:4px;min-width:640px;position:relative;padding-top:1.4rem}
.hour{
  flex:1;border-radius:8px 8px 4px 4px;position:relative;min-width:20px;
  display:flex;flex-direction:column;justify-content:flex-end;height:120px;
  background:#EDF2EC;cursor:pointer;border:none;padding:0;
}
.hour .fill{border-radius:8px 8px 4px 4px;width:100%;transition:height .5s}
.hour .h-label{font-size:.62rem;text-align:center;color:#557060;margin-top:.3rem;position:absolute;bottom:-1.15rem;width:100%}
.hour .euro{position:absolute;top:-1.05rem;width:100%;text-align:center;font-size:.7rem;font-weight:700;color:var(--pine)}
.hour.now::after{
  content:"";position:absolute;top:-1.55rem;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--ink);
}
.strip-legend{display:flex;gap:1.2rem;margin-top:2rem;font-size:.82rem;color:#2c463a;flex-wrap:wrap}
.strip-legend span{display:flex;align-items:center;gap:.4rem}
.chip{width:.9rem;height:.9rem;border-radius:4px;display:inline-block}
.hour-detail{
  margin-top:1rem;padding:.9rem 1.1rem;border-radius:14px;background:var(--paper);
  border:1px solid var(--line);font-size:.95rem;min-height:3.2rem;
}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.6rem;min-width:640px}
.day-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:.8rem .6rem;text-align:center}
.day-card .d-name{font-weight:700;font-size:.85rem}
.day-card .d-score{font-family:'Bricolage Grotesque',sans-serif;font-size:1.5rem;font-weight:800;margin:.3rem 0}
.day-card .d-win{font-size:.75rem;color:#557060}
.day-badge{display:inline-block;padding:.1rem .5rem;border-radius:999px;font-size:.7rem;font-weight:700;margin-top:.3rem}
.sources{font-size:.78rem;color:#6a8274;margin-top:1rem}

/* ---------- how it works ---------- */
.trio{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.6rem}
@media(max-width:820px){.trio{grid-template-columns:1fr}}
.t-card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:1.4rem}
.t-card .ico{font-size:1.9rem}
.t-card h3{font-size:1.12rem;margin:.6rem 0 .35rem;font-weight:700}
.t-card p{font-size:.93rem;color:#2c463a}
.appliances{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.4rem}
.app-chip{
  display:flex;align-items:center;gap:.5rem;background:var(--card);
  border:1.5px solid var(--line);border-radius:999px;padding:.5rem 1rem;font-size:.92rem;font-weight:600;
}

/* ---------- business use cases ---------- */
.biz-band{background:var(--ink);color:#E9F3E9}
.biz-band .eyebrow{color:var(--glow)}
.biz-band .sub{color:#cfe3cf}
.uc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.8rem}
@media(max-width:860px){.uc-grid{grid-template-columns:1fr}}
.uc-card{
  background:#1c3527;border:1.5px solid #33513f;border-radius:20px;padding:1.5rem;
  display:flex;flex-direction:column;
}
.uc-card .ico{font-size:2rem}
.uc-card h3{font-size:1.15rem;margin:.7rem 0 .4rem;font-weight:700;color:#fff}
.uc-card p{font-size:.92rem;color:#cfe3cf;flex:1}
.uc-save{
  margin-top:1.1rem;padding:.8rem .9rem;border-radius:14px;background:var(--glow);color:var(--ink);
}
.uc-save .amount{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.45rem;line-height:1.1}
.uc-save .amount-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.uc-assum{font-size:.75rem;color:#9db8a4;margin-top:.7rem}
.biz-disclaimer{font-size:.78rem;color:#9db8a4;margin-top:1.4rem;max-width:52rem}

/* ---------- FAQ ---------- */
details.faq{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:1rem 1.3rem;margin-top:.7rem}
details.faq summary{font-weight:700;cursor:pointer;font-size:1rem;list-style-position:inside}
details.faq summary::marker{color:var(--pine)}
details.faq[open] summary{color:var(--pine)}
details.faq .faq-a{margin-top:.7rem;font-size:.93rem;color:#2c463a;line-height:1.6}

/* ---------- forms ---------- */
.split{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start}
@media(max-width:900px){.split{grid-template-columns:1fr}}
.form-card{background:var(--card);border:1.5px solid var(--line);border-radius:22px;padding:1.8rem}
.form-card.biz{background:var(--ink);color:#E9F3E9;border-color:var(--ink)}
.form-card.biz .eyebrow{color:var(--glow)}
.form-card.biz label{color:#cfe3cf}
.form-card h2{font-size:1.5rem}
.f-row{margin-top:1rem}
label{display:block;font-size:.86rem;font-weight:600;margin-bottom:.3rem}
.f-row input,.f-row select,.f-row textarea{
  width:100%;padding:.7rem .9rem;border:1.5px solid var(--line);border-radius:12px;background:var(--paper);
  font-family:inherit;font-size:.95rem;color:var(--ink);
}
.form-card.biz input,.form-card.biz select,.form-card.biz textarea{background:#1c3527;border-color:#33513f;color:#E9F3E9}
.radio-row{display:flex;gap:.5rem;flex-wrap:wrap}
.radio-row label{
  border:1.5px solid var(--line);border-radius:999px;padding:.45rem 1rem;font-weight:600;
  display:flex;align-items:center;gap:.4rem;cursor:pointer;margin:0;background:var(--paper);
}
.form-card.biz .radio-row label{background:#1c3527;border-color:#33513f}
.radio-row input{width:auto;accent-color:var(--pine)}
.radio-row label:has(input:checked){background:var(--glow);border-color:var(--pine);color:var(--ink)}
.submit{
  margin-top:1.4rem;width:100%;padding:.9rem;border:none;border-radius:14px;
  background:var(--pine);color:#fff;font-weight:700;font-size:1rem;
}
.submit:hover{background:var(--leaf)}
.form-card.biz .submit{background:var(--glow);color:var(--ink)}
.confirm{
  display:none;margin-top:1rem;padding:.9rem 1rem;border-radius:12px;
  background:var(--glow);color:var(--ink);font-weight:600;font-size:.95rem;
}
.confirm.show{display:block}

/* ---------- footer ---------- */
footer{border-top:1.5px solid var(--line);margin-top:2rem}
.foot-in{max-width:1120px;margin:0 auto;padding:2rem 1.2rem;display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;font-size:.85rem;color:#557060}
</style>
</head>
<body>

<header>
  <div class="header-in">
    <a class="logo" href="#top"><span class="dot"></span>Gena<small>Green Energy Alert</small></a>
    <nav>
      <a href="#timeline" data-i18n="nav_now"></a>
      <a href="#how" data-i18n="nav_how"></a>
      <a href="#alerts" data-i18n="nav_alerts"></a>
      <a href="#business" data-i18n="nav_biz"></a>
      <a href="#faq" data-i18n="nav_faq"></a>
    </nav>
    <div class="langs" role="group" aria-label="Language">
      <button data-lang="fr" aria-pressed="true">FR</button>
      <button data-lang="de" aria-pressed="false">DE</button>
      <button data-lang="en" aria-pressed="false">EN</button>
    </div>
  </div>
</header>

<div id="banner" style="display:none;max-width:1120px;margin:1rem auto 0;padding:.9rem 1.2rem;border-radius:14px;background:var(--glow);color:var(--ink);font-weight:600" role="status"></div>

<main id="top">

<!-- HERO -->
<section class="hero">
  <div>
    <h1 data-i18n-html="hero_title"></h1>
    <p class="lede" data-i18n="hero_lede"></p>
    <form class="search" id="geoForm">
      <input id="geoInput" type="text" autocomplete="postal-code" data-i18n-ph="search_ph" aria-label="Location">
      <button type="submit" data-i18n="search_btn"></button>
    </form>
    <p class="search-hint" data-i18n="search_hint"></p>
    <p class="geo-msg" id="geoMsg" role="status"></p>
  </div>

  <div class="status-card" aria-live="polite">
    <div class="status-loc">📍 <span id="locName">Munich, DE</span></div>
    <div class="status-top">
      <div class="dial" id="dial">⏳</div>
      <div>
        <div class="status-label" id="statusLabel">…</div>
        <div class="status-sub" id="statusSub"></div>
      </div>
    </div>
    <div class="price-line" id="priceLine" style="display:none">
      💶 <span class="p-val" id="priceVal"></span>
      <span style="color:#557060;font-size:.85rem" data-i18n="p_unit"></span>
      <span class="price-tag" id="priceTag"></span>
    </div>
    <div class="next-window" id="nextWindow"></div>
  </div>
</section>

<!-- TIMELINE -->
<section class="section" id="timeline">
  <div class="eyebrow" data-i18n="tl_eyebrow"></div>
  <h2 data-i18n="tl_title"></h2>
  <p class="sub" data-i18n="tl_sub"></p>

  <div class="tabs" role="tablist">
    <button role="tab" aria-selected="true" data-view="today" data-i18n="tab_today"></button>
    <button role="tab" aria-selected="false" data-view="week" data-i18n="tab_week"></button>
  </div>

  <div class="strip-wrap">
    <div id="viewToday">
      <div class="strip" id="strip"></div>
      <div class="strip-legend">
        <span><span class="chip" style="background:var(--glow)"></span><span data-i18n="lg_green"></span></span>
        <span><span class="chip" style="background:var(--sun)"></span><span data-i18n="lg_mid"></span></span>
        <span><span class="chip" style="background:#E4C4B8"></span><span data-i18n="lg_low"></span></span>
        <span>€ <span data-i18n="lg_cheap"></span></span>
      </div>
      <div class="hour-detail" id="hourDetail" data-i18n="hd_hint"></div>
    </div>
    <div id="viewWeek" style="display:none;overflow-x:auto">
      <div class="week-grid" id="weekGrid"></div>
    </div>
  </div>
  <p class="sources" data-i18n="sources"></p>
</section>

<!-- HOW -->
<section class="section" id="how">
  <div class="eyebrow" data-i18n="how_eyebrow"></div>
  <h2 data-i18n="how_title"></h2>
  <div class="trio">
    <div class="t-card">
      <div class="ico">🌬️☀️</div>
      <h3 data-i18n="how1_t"></h3>
      <p data-i18n="how1_p"></p>
    </div>
    <div class="t-card">
      <div class="ico">💶</div>
      <h3 data-i18n="how2_t"></h3>
      <p data-i18n="how2_p"></p>
    </div>
    <div class="t-card">
      <div class="ico">🏠</div>
      <h3 data-i18n="how3_t"></h3>
      <p data-i18n="how3_p"></p>
    </div>
  </div>
  <div class="appliances">
    <span class="app-chip">🚗 <span data-i18n="app_ev"></span></span>
    <span class="app-chip">🌡️ <span data-i18n="app_hp"></span></span>
    <span class="app-chip">❄️ <span data-i18n="app_ac"></span></span>
    <span class="app-chip">🔥 <span data-i18n="app_heat"></span></span>
    <span class="app-chip">🌀 <span data-i18n="app_wash"></span></span>
    <span class="app-chip">🍽️ <span data-i18n="app_dish"></span></span>
    <span class="app-chip">🔋 <span data-i18n="app_batt"></span></span>
  </div>
</section>

<!-- BUSINESS USE CASES -->
<div class="biz-band" id="business">
  <section class="section">
    <div class="eyebrow" data-i18n="uc_eyebrow"></div>
    <h2 style="color:#fff" data-i18n="uc_title"></h2>
    <p class="sub" data-i18n="uc_sub"></p>
    <div class="uc-grid">
      <div class="uc-card">
        <div class="ico">🚗</div>
        <h3 data-i18n="uc1_t"></h3>
        <p data-i18n="uc1_p"></p>
        <div class="uc-save">
          <div class="amount-label" data-i18n="uc_savelabel"></div>
          <div class="amount">≈ 320 €<span style="font-size:.85rem;font-weight:600"> /<span data-i18n="uc_month"></span></span></div>
        </div>
        <p class="uc-assum" data-i18n="uc1_a"></p>
      </div>
      <div class="uc-card">
        <div class="ico">❄️</div>
        <h3 data-i18n="uc2_t"></h3>
        <p data-i18n="uc2_p"></p>
        <div class="uc-save">
          <div class="amount-label" data-i18n="uc_savelabel"></div>
          <div class="amount">≈ 260 €<span style="font-size:.85rem;font-weight:600"> /<span data-i18n="uc_month"></span></span></div>
        </div>
        <p class="uc-assum" data-i18n="uc2_a"></p>
      </div>
      <div class="uc-card">
        <div class="ico">🏭</div>
        <h3 data-i18n="uc3_t"></h3>
        <p data-i18n="uc3_p"></p>
        <div class="uc-save">
          <div class="amount-label" data-i18n="uc_savelabel"></div>
          <div class="amount">≈ 210 €<span style="font-size:.85rem;font-weight:600"> /<span data-i18n="uc_month"></span></span></div>
        </div>
        <p class="uc-assum" data-i18n="uc3_a"></p>
      </div>
    </div>
    <p class="biz-disclaimer" data-i18n="uc_disclaimer"></p>
  </section>
</div>

<!-- FAQ -->
<section class="section" id="faq">
  <div class="eyebrow" data-i18n="faq_eyebrow"></div>
  <h2 data-i18n="faq_title"></h2>
  <details class="faq">
    <summary data-i18n="faq1_q"></summary>
    <div class="faq-a" data-i18n-html="faq1_a"></div>
  </details>
  <details class="faq">
    <summary data-i18n="faq2_q"></summary>
    <div class="faq-a" data-i18n-html="faq2_a"></div>
  </details>
  <details class="faq">
    <summary data-i18n="faq3_q"></summary>
    <div class="faq-a" data-i18n-html="faq3_a"></div>
  </details>
  <details class="faq">
    <summary data-i18n="faq4_q"></summary>
    <div class="faq-a" data-i18n-html="faq4_a"></div>
  </details>
</section>

<!-- ALERTS + BUSINESS CONTACT -->
<section class="section" id="alerts">
  <div style="max-width:560px;margin:0 auto">
    <form class="form-card" id="alertForm">
      <div class="eyebrow" data-i18n="al_eyebrow"></div>
      <h2 data-i18n="al_title"></h2>
      <p class="sub" style="font-size:.95rem" data-i18n="al_sub"></p>
      <div class="f-row">
        <label for="alName" data-i18n="f_name"></label>
        <input id="alName" type="text" required>
      </div>
      <div class="f-row">
        <label for="alEmail" data-i18n="f_email"></label>
        <input id="alEmail" type="email" required>
      </div>
      <div class="f-row">
        <label for="alZip" data-i18n="f_zip"></label>
        <input id="alZip" type="text" autocomplete="postal-code" required>

let lang = (navigator.language||"fr").slice(0,2);
if(!I18N[lang]) lang = "en";
const T = () => I18N[lang];

function applyI18n(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = T()[el.dataset.i18n] ?? el.textContent; });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ el.innerHTML = T()[el.dataset.i18nHtml] ?? el.innerHTML; });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.placeholder = T()[el.dataset.i18nPh] ?? ""; });
  document.querySelectorAll(".langs button").forEach(b=>b.setAttribute("aria-pressed", b.dataset.lang===lang ? "true":"false"));
  renderAll();
}
document.querySelectorAll(".langs button").forEach(b=>b.addEventListener("click",()=>{lang=b.dataset.lang;applyI18n();}));

/* ================= data model ================= */
let state = {
  name:"Munich, DE", lat:48.137, lon:11.575, country:"DE",
  hours:[] // {time, wind:0-1, sun:0-1, demand:0-1, price:ct/kWh|null, score:0-100}
};

const demandCurve = h => {
  const c=[.35,.3,.28,.27,.28,.35,.55,.8,.85,.7,.6,.58,.6,.58,.55,.58,.65,.8,.95,1,.9,.75,.6,.45];
  return c[h];
};

function computeScore(wind,sun,demand,priceNorm){
  // priceNorm: 0 (cheapest of horizon) → 1 (most expensive), or null
  const supply = 0.55*wind + 0.45*sun;
  let s = supply - 0.30*(demand-0.5);
  s = Math.max(0,Math.min(1,s));
  if(priceNorm!=null) s = 0.7*s + 0.3*(1-priceNorm);
  return Math.round(s*100);
}

function estimatePrice(wind,sun,demand){ // rough synthetic ct/kWh when API unavailable
  return Math.round((14 - 8*(0.55*wind+0.45*sun) + 6*(demand-0.5))*10)/10;
}

function simulate(){
  const now = new Date(); now.setMinutes(0,0,0);
  const hours=[];
  for(let i=0;i<168;i++){
    const t = new Date(now.getTime()+i*3600e3);
    const h = t.getHours();
    const sun = Math.min(1, Math.max(0, Math.sin((h-6)/13*Math.PI)) * (0.7+0.3*Math.sin(i/40)));
    const wind = Math.max(0,Math.min(1, 0.35+0.35*Math.sin(i/9+2)+0.15*Math.sin(i/3)));
    const d = demandCurve(h);
    hours.push({time:t,wind,sun,demand:d,price:estimatePrice(wind,sun,d),score:0});
  }
  return hours;
}

async function fetchForecast(lat,lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,wind_speed_100m&forecast_days=7&timezone=auto`;
  const r = await fetch(url);
  if(!r.ok) throw new Error("api");
  const j = await r.json();
  const now = new Date(); now.setMinutes(0,0,0);
  const hours=[];
  j.hourly.time.forEach((iso,i)=>{
    const t = new Date(iso);
    if(t < now) return;
    const rad = j.hourly.shortwave_radiation[i] ?? 0;
    const ws  = j.hourly.wind_speed_100m[i] ?? 0; // km/h
    const sun = Math.min(1, rad/750);
    const wr = Math.min(1, ws/45);
    const wind = Math.pow(wr, 1.6);
    const d = demandCurve(t.getHours());
    hours.push({time:t,wind,sun,demand:d,price:null,score:0});
  });
  return hours.slice(0,168);
}

async function fetchPrices(country){
  // Real day-ahead prices (EUR/MWh) from Energy-Charts (Fraunhofer ISE), free & keyless
  const bzn = country==="FR" ? "FR" : "DE-LU";
  const r = await fetch(`https://api.energy-charts.info/price?bzn=${bzn}`);
  if(!r.ok) throw new Error("price");
  const j = await r.json();
  const map = new Map();
  j.unix_seconds.forEach((s,i)=>{
    if(j.price[i]!=null) map.set(new Date(s*1000).getTime(), j.price[i]/10); // → ct/kWh
  });
  return map;
}

function finalize(hours,priceMap){
  hours.forEach(h=>{
    if(priceMap){
      const p = priceMap.get(h.time.getTime());
      h.price = p!=null ? Math.round(p*10)/10 : estimatePrice(h.wind,h.sun,h.demand);
      h.realPrice = p!=null;
    } else {
      h.price = estimatePrice(h.wind,h.sun,h.demand);
      h.realPrice = false;
    }
  });
  const ps = hours.slice(0,48).map(h=>h.price);
  const pMin = Math.min(...ps), pMax = Math.max(...ps);
  hours.forEach(h=>{
    const pn = pMax>pMin ? (h.price-pMin)/(pMax-pMin) : 0.5;
    h.priceNorm = pn;
    h.score = computeScore(h.wind,h.sun,h.demand,pn);
  });
  return hours;
}

async function loadData(){
  let hours, priceMap=null;
  try{ hours = await fetchForecast(state.lat,state.lon); }
  catch(e){ hours = simulate(); }
  try{ priceMap = await fetchPrices(state.country); }catch(e){}
  state.hours = finalize(hours,priceMap);
  renderAll();
}

/* ================= geocoding ================= */
const geoForm = document.getElementById("geoForm");
const geoMsg = document.getElementById("geoMsg");
geoForm.addEventListener("submit", async e=>{
  e.preventDefault();
  const q = document.getElementById("geoInput").value.trim();
  if(!q) return;
  geoMsg.className="geo-msg"; geoMsg.textContent="…";
  try{
    const langP = lang==="de"?"de":lang==="fr"?"fr":"en";
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=${langP}`);
    const j = await r.json();
    const hit = (j.results||[]).find(x=>x.country_code==="DE"||x.country_code==="FR");
    if(!hit) throw new Error("nf");
    state = {...state, name:`${hit.name}, ${hit.country_code}`, lat:hit.latitude, lon:hit.longitude, country:hit.country_code};
    document.getElementById("locName").textContent = state.name;
    geoMsg.className="geo-msg ok"; geoMsg.textContent = `${T().geo_ok} ${state.name}.`;
    await loadData();
  }catch(err){
    geoMsg.className="geo-msg err"; geoMsg.textContent = T().geo_err;
  }
});

/* ================= rendering ================= */
const strip = document.getElementById("strip");
const hourDetail = document.getElementById("hourDetail");

function colorFor(s){ return s>=60 ? "var(--glow)" : s>=40 ? "var(--sun)" : "#E4C4B8"; }
function fmtH(d){ return d.getHours().toString().padStart(2,"0")+"h"; }
function demandWord(d){ return d>0.75?T().dm_high : d>0.5?T().dm_mid : T().dm_low; }

function renderStatus(){
  if(!state.hours.length) return;
  const cur = state.hours[0];
  const next24 = state.hours.slice(0,24);
  const dial = document.getElementById("dial");
  const lbl = document.getElementById("statusLabel");
  const sub = document.getElementById("statusSub");
  dial.className="dial "+(cur.score>=60?"green":cur.score>=40?"mid":"low");
  dial.textContent = cur.score>=60?"⚡":cur.score>=40?"🌤️":"⏸️";
  lbl.textContent = cur.score>=60?T().st_green:cur.score>=40?T().st_mid:T().st_low;
  sub.textContent = (cur.score>=60?T().st_green_sub:cur.score>=40?T().st_mid_sub:T().st_low_sub)+` · ${T().hd_score} ${cur.score}/100`;

  // price line
  const pl = document.getElementById("priceLine");
  if(cur.price!=null){
    pl.style.display="flex";
    document.getElementById("priceVal").textContent = cur.price.toFixed(1).replace(".",lang==="en"?".":",");
    const tag = document.getElementById("priceTag");
    const w = cur.priceNorm<0.33?["p_cheap","var(--glow)","var(--ink)"]:cur.priceNorm<0.66?["p_mid","#FBEBC8","var(--ink)"]:["p_high","#F6DED5","var(--bad)"];
    tag.textContent = T()[w[0]]; tag.style.background=w[1]; tag.style.color=w[2];
  } else pl.style.display="none";

  // next window + savings vs evening peak
  const win = next24.find((h,i)=>i>0 && h.score>=60);
  const nw = document.getElementById("nextWindow");
  if(win){
    const sameDay = win.time.getDate()===new Date().getDate();
    let save = "";
    const peak = Math.max(...next24.map(h=>h.price));
    if(win.price!=null && peak>0 && win.price<peak){
      const pct = Math.round((1-win.price/peak)*100);
      if(pct>=10) save = ` · 💶 ${T().nw_save.replace("%s",pct)}`;
    }
    nw.innerHTML = `${T().nw_pre} <strong>${sameDay?T().nw_today:T().nw_tom} ${fmtH(win.time)}</strong> ⚡${save}`;
  } else {
    nw.textContent = T().nw_none;
  }
}

function renderStrip(){
  strip.innerHTML="";
  const day = state.hours.slice(0,24);
  const cheapest = [...day].sort((a,b)=>a.price-b.price).slice(0,3).map(h=>h.time.getTime());
  day.forEach((h,i)=>{
    const b = document.createElement("button");
    b.type="button"; b.className="hour"+(i===0?" now":"");
    b.setAttribute("aria-label", `${fmtH(h.time)} — ${T().hd_score} ${h.score}/100, ${T().hd_price} ${h.price} ct/kWh`);
    const f = document.createElement("div"); f.className="fill";
    f.style.height = Math.max(8,h.score)+"%";
    f.style.background = colorFor(h.score);
    b.appendChild(f);
    if(cheapest.includes(h.time.getTime())){
      const e = document.createElement("div"); e.className="euro"; e.textContent="€";
      b.appendChild(e);
    }
    const l = document.createElement("div"); l.className="h-label"; l.textContent = fmtH(h.time);
    b.appendChild(l);
    b.addEventListener("click",()=>{
      hourDetail.innerHTML =
        `<strong>${fmtH(h.time)}</strong> · ${T().hd_score} <strong>${h.score}/100</strong> — `+
        `💶 ${T().hd_price} <strong>${h.price} ct/kWh</strong> · `+
        `🌬️ ${T().hd_wind} ${Math.round(h.wind*100)}% · ☀️ ${T().hd_sun} ${Math.round(h.sun*100)}% · 🏠 ${T().hd_demand} : ${demandWord(h.demand)}`;
    });
    strip.appendChild(b);
  });
}

function renderWeek(){
  const grid = document.getElementById("weekGrid");
  grid.innerHTML="";
  const byDay = {};
  state.hours.forEach(h=>{
    const k = h.time.toDateString();
    (byDay[k]=byDay[k]||[]).push(h);
  });
  Object.values(byDay).slice(0,7).forEach(day=>{
    const avg = Math.round(day.reduce((a,h)=>a+h.score,0)/day.length);
    const best = day.reduce((a,h)=>h.score>a.score?h:a, day[0]);
    const c = document.createElement("div"); c.className="day-card";
    const badgeCol = avg>=55?"var(--glow)":avg>=40?"var(--sun)":"#E4C4B8";
    c.innerHTML = `<div class="d-name">${T().days[best.time.getDay()]} ${best.time.getDate()}</div>
      <div class="d-score" style="color:${avg>=55?'var(--pine)':avg>=40?'#B07E1E':'var(--bad)'}">${avg}</div>
      <div class="d-win">${T().best}<br><strong>${fmtH(best.time)}</strong></div>
      <span class="day-badge" style="background:${badgeCol}">${best.score}/100</span>`;
    grid.appendChild(c);
  });
}

function renderAll(){ renderStatus(); renderStrip(); renderWeek(); }

/* tabs */
document.querySelectorAll(".tabs button").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tabs button").forEach(x=>x.setAttribute("aria-selected","false"));
  t.setAttribute("aria-selected","true");
  document.getElementById("viewToday").style.display = t.dataset.view==="today"?"":"none";
  document.getElementById("viewWeek").style.display = t.dataset.view==="week"?"":"none";
}));

/* ---- alert profile: POST to serverless backend (double opt-in) ---- */
document.getElementById("alertForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const btn = document.getElementById("alSubmit");
  const ok = document.getElementById("alConfirm");
  const err = document.getElementById("alError");
  ok.classList.remove("show"); err.classList.remove("show");
  btn.disabled = true; const oldTxt = btn.textContent; btn.textContent = T().al_sending;
  try{
    // geocode the zip so alerts use the subscriber's own location
    let loc = {lat:state.lat, lon:state.lon, country:state.country, locName:state.name};
    try{
      const zip = document.getElementById("alZip").value.trim();
      const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(zip)}&count=8`);
      const gj = await g.json();
      const hit = (gj.results||[]).find(x=>x.country_code==="DE"||x.country_code==="FR");
      if(hit) loc = {lat:hit.latitude, lon:hit.longitude, country:hit.country_code, locName:`${hit.name}, ${hit.country_code}`};
    }catch(_){}
    const payload = {
      name: document.getElementById("alName").value.trim(),
      email: document.getElementById("alEmail").value.trim(),
      zip: document.getElementById("alZip").value.trim(),
      lead: document.querySelector('input[name="lead"]:checked').value,
      freq: document.querySelector('input[name="freq"]:checked').value,
      lang, ...loc
    };
    const r = await fetch("/api/subscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error("subscribe");
    ok.classList.add("show");
    e.target.reset();
  }catch(_){ err.classList.add("show"); }
  btn.disabled = false; btn.textContent = oldTxt;
});

/* ---- banners after confirm / unsubscribe redirects ---- */
function showBanner(){
  const p = new URLSearchParams(location.search);
  const banner = document.getElementById("banner");
  if(p.get("confirmed")==="1"){ banner.textContent = T().conf_banner; banner.style.display="block"; }
  else if(p.get("unsubscribed")==="1"){ banner.textContent = T().unsub_banner; banner.style.display="block"; }
}

/* init */
applyI18n();
showBanner();
loadData();
